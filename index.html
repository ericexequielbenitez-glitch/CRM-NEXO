<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Kairo CRM</title>
<style>
body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* LOGIN */
.login-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
width:360px;
}
.card img{
width:120px;
margin-bottom:10px;
}
.card input{
width:90%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}
.card button{
width:95%;
padding:10px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

/* CRM */
.sidebar{
width:220px;
height:100vh;
background:#1f2937;
color:white;
position:fixed;
padding:20px;
}
.sidebar button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
cursor:pointer;
}
.main{
margin-left:240px;
padding:40px;
}
.card-panel{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
max-width:600px;
}
.hidden{display:none;}
input,select{
padding:8px;
margin:5px;
width:220px;
}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}
td,th{
border-bottom:1px solid #ddd;
padding:10px;
}
.peligro{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
<div class="card">
<img src="Kairo logo.png">
<h2>CRM</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>
</div>

<!-- CRM -->
<div id="crm" class="hidden">
<div class="sidebar">
<h3>Kairo CRM</h3>
<button onclick="dashboard()">Dashboard</button>
<button onclick="nuevaVenta()">Nueva venta</button>
<button onclick="verAlumnos()">Buscar alumnos</button>
</div>

<div class="main">
<div id="panel" class="card-panel">
<h3>Panel</h3>
<p>Bienvenido al CRM del instituto Kairo</p>
</div>

<div id="wizard" class="card-panel hidden"></div>

<div id="alumnos" class="card-panel hidden">
<h3>Alumnos</h3>
<input id="buscar" placeholder="Buscar..." onkeyup="buscar()">
<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Curso</th>
<th>Estado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>
</div>
</div>

<script>
const usuarios = [
  {user:"admin", pass:"1234"},
  {user:"ventas", pass:"1234"}
]

let alumnos=JSON.parse(localStorage.getItem("alumnos"))||[]
let paso=1
let venta={}
let carrito=[]

// precios por curso
const precios={
"word-basico":20000,
"word-intermedio":20000,
"word-avanzado":20000,
"excel-basico":20000,
"excel-intermedio":20000,
"excel-avanzado":20000,
"publisher-basico":20000,
"publisher-intermedio":20000,
"publisher-avanzado":20000,
"access-basico":20000,
"access-intermedio":20000,
"access-avanzado":20000,
"ingles":30000,
"frances":30000,
"portugues":30000
}

function login(){
  let u=document.getElementById("user").value.trim().toLowerCase()
  let p=document.getElementById("pass").value.trim()
  let ok=usuarios.find(x=>x.user.toLowerCase()===u && x.pass===p)
  if(ok){
    document.getElementById("login").style.display="none"
    document.getElementById("crm").classList.remove("hidden")
    dashboard()
  } else {
    alert("Usuario o contraseña incorrectos")
  }
}

function ocultar(){document.querySelectorAll("#panel,#wizard,#alumnos").forEach(x=>x.classList.add("hidden"))}
function dashboard(){ocultar();document.getElementById("panel").classList.remove("hidden")}
function nuevaVenta(){paso=1;venta={};carrito=[];ocultar();document.getElementById("wizard").classList.remove("hidden");mostrarPaso()}

function mostrarPaso(){
let w=document.getElementById("wizard")
if(paso===1){
w.innerHTML=`
<h3>Paso 1 — Datos personales</h3>
<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="dni" placeholder="DNI"><br><br>
<button onclick="guardarDatos()">Siguiente</button>`
}
if(paso===2){
w.innerHTML=`
<h3>Paso 2 — Selección de cursos</h3>
<select id="curso">
<option value="">Seleccione un curso</option>
<option value="word-basico">MS Word Básico</option>
<option value="word-intermedio">MS Word Intermedio</option>
<option value="word-avanzado">MS Word Avanzado</option>
<option value="excel-basico">MS Excel Básico</option>
<option value="excel-intermedio">MS Excel Intermedio</option>
<option value="excel-avanzado">MS Excel Avanzado</option>
<option value="publisher-basico">MS Publisher Básico</option>
<option value="publisher-intermedio">MS Publisher Intermedio</option>
<option value="publisher-avanzado">MS Publisher Avanzado</option>
<option value="access-basico">MS Access Básico</option>
<option value="access-intermedio">MS Access Intermedio</option>
<option value="access-avanzado">MS Access Avanzado</option>
<option value="ingles">Inglés</option>
<option value="frances">Francés</option>
<option value="portugues">Portugués</option>
</select><br><br>
<button onclick="agregarCarrito()">🛒 Añadir al carrito</button>
<div id="carrito"></div><br>
<button onclick="siguiente()">Siguiente</button>`
}
if(paso===3){
w.innerHTML=`
<h3>Paso 3 — Promoción</h3>
<p class="peligro">⚠️ No seleccionar ninguna oferta — exclusivo de retención</p>
<select id="promo" onchange="promo()">
<option value="0">Sin promo</option>
<option value="25">25%</option>
<option value="30">30%</option>
<option value="50">50%</option>
<option value="10">Idioma 10%</option>
</select>
<div id="total"></div><br>
<button onclick="siguiente()">Siguiente</button>`
}
if(paso===4){
w.innerHTML=`
<h3>Paso 4 — Pago</h3>
<select id="pago">
<option>No pagó</option>
<option>Pagó</option>
</select><br><br>
<button onclick="finalizar()">Finalizar</button>`
}
}

function guardarDatos(){venta.nombre=document.getElementById("nombre").value;siguiente()}
function siguiente(){paso++;mostrarPaso()}

function agregarCarrito(){
let curso=document.getElementById("curso").value
if(curso){
carrito.push(curso)
document.getElementById("carrito").innerHTML="<h4>Carrito:</h4><ul>"+carrito.map(c=>"<li>"+c+" — $"+precios[c].toLocaleString()+"</li>").join("")+"</ul>"
venta.cursos=carrito
}else{alert("Seleccione un curso antes de añadir al carrito")}
}

function promo(){
let p=parseInt(document.getElementById("promo").value)
let total=0
carrito.forEach(c=>{total+=precios[c]})
if(venta.cursos && venta.cursos.includes("ingles") && p===10){total=total*0.9}else{total=total*(1-p/100)}
venta.total=total
document.getElementById("total").innerHTML="Total mensual con promo: $"+total.toLocaleString()
}

function generarID(){return "ALU-"+Math.floor(Math.random()*100000)}
function generarGestion(){return "GEST-"+Date.now()}

function finalizar(){
let alumno={id:generarID(),gestion:generarGestion(),nombre:venta.nombre,curso:(venta.cursos||[]).join(", "),estado:document.getElementById("pago").value==="Pagó"?"Activo":"Inactivo"}
alumnos.push(alumno)
localStorage.setItem("alumnos",JSON.stringify(alumnos))
alert("Alumno
