<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kairo CRM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<style>
    body { font-family: Arial; margin: 20px; }
    .card { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    .btn { padding: 8px 12px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
    .btn-danger { background: #d9534f; }
    .btn-success { background: #5cb85c; }
</style>
</head>
<body>

<h1>📘 Kairo CRM</h1>

<div class="card">
    <h2>➕ Crear Alumno</h2>
    <input id="nombre" placeholder="Nombre del alumno"><br><br>
    <input id="email" placeholder="Email"><br><br>
    <input id="monto" placeholder="Monto mensual"><br><br>
    <button class="btn" onclick="crearAlumno()">Crear alumno</button>
</div>

<div class="card">
    <h2>📋 Lista de alumnos</h2>
    <div id="listaAlumnos"></div>
</div>

<script>
// -------------------------------------------------------------
// 🔐 CREDENCIALES DE MERCADO PAGO (PEGAR LAS REALES)
// -------------------------------------------------------------
const MP_PUBLIC_KEY = "APP_USR-24e13e97-3f85-4a5b-a859-478a1b9ef88d"; 
const MP_ACCESS_TOKEN = "APP_USR-3385521442823122-031511-3a833bdaafe97ed820f896519f5e77c0-306613517";

// -------------------------------------------------------------
// 🛡️ LOGO DE KAIRO (BASE64) — YA CONVERTIDO
// -------------------------------------------------------------
const KAIRO_LOGO_BASE64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAoAAAAJYCAYAAABt0Ax7AAAACXBIWXMAAAsTAAALEwEAmpwYAAAgAElEQVR4nOzdZ3hU1f7/8c+5M7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7szO7

// -------------------------------------------------------------
// 📌 BASE DE DATOS LOCAL (localStorage)
// -------------------------------------------------------------
let alumnos = JSON.parse(localStorage.getItem("alumnos")) || [];

// -------------------------------------------------------------
// ➕ CREAR ALUMNO
// -------------------------------------------------------------
async function crearAlumno() {
    const nombre = document.getElementById("nombre").value;
    const email = document.getElementById("email").value;
    const monto = parseFloat(document.getElementById("monto").value);

    if (!nombre || !email || !monto) {
        alert("Completá todos los campos");
        return;
    }

    const id = "ALU-" + Date.now();

    const qrURL = await generarQR(id, nombre, email, monto);

    const alumno = {
        id,
        nombre,
        email,
        monto,
        qr: qrURL,
        facturas: []
    };

    alumno.facturas.push(generarFactura(alumno));

    alumnos.push(alumno);
    guardar();
    mostrarAlumnos();
}

// -------------------------------------------------------------
// 🧾 GENERAR FACTURA
// -------------------------------------------------------------
function generarFactura(alumno) {
    const hoy = new Date();
    const mes = hoy.getMonth() + 1;
    const año = hoy.getFullYear();

    return {
        numero: `FAC-${año}-${mes}-${alumno.id}`,
        emision: `${año}-${mes}-01`,
        vencimiento: `${año}-${mes}-12`,
        estado: "Pendiente",
        qr: alumno.qr
    };
}

// -------------------------------------------------------------
// 💾 GUARDAR EN LOCALSTORAGE
// -------------------------------------------------------------
function guardar() {
    localStorage.setItem("alumnos", JSON.stringify(alumnos));
}

// -------------------------------------------------------------
// 📋 MOSTRAR ALUMNOS
// -------------------------------------------------------------
function mostrarAlumnos() {
    const div = document.getElementById("listaAlumnos");
    div.innerHTML = "";

    alumnos.forEach(a => {
        div.innerHTML += `
            <div class="card">
                <h3>${a.nombre} (${a.id})</h3>
                <p>Email: ${a.email}</p>
                <p>Monto: $${a.monto}</p>
                <button class="btn-success" onclick="descargarFactura('${a.id}')">Descargar factura PDF</button>
                <button class="btn-danger" onclick="marcarPagado('${a.id}')">Marcar como pagado</button>
            </div>
        `;
    });
}

mostrarAlumnos();

// -------------------------------------------------------------
// 🟦 GENERAR QR DINÁMICO (Mercado Pago)
// -------------------------------------------------------------
async function generarQR(id, nombre, email, monto) {
    const body = {
        items: [
            {
                title: `Pago mensual - ${nombre}`,
                quantity: 1,
                unit_price: monto
            }
        ],
        external_reference: id,
        payer: { name: nombre, email: email }
    };

    const res = await fetch("https://api.mercadopago.com/checkout/preferences", {
        method: "POST",
        headers: {
            "Authorization": `Bearer ${MP_ACCESS_TOKEN}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
    });

    const data = await res.json();
    return data.init_point;
}

// -------------------------------------------------------------
// 📄 DESCARGAR FACTURA PDF
// -------------------------------------------------------------
async function descargarFactura(id) {
    const alumno = alumnos.find(a => a.id === id);
    const factura = alumno.facturas[0];

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    pdf.addImage(KAIRO_LOGO_BASE64, "PNG", 10, 10, 40, 40);

    pdf.setFontSize(18);
    pdf.text("Factura Kairo", 70, 20);

    pdf.setFontSize(12);
    pdf.text(`Alumno: ${alumno.nombre}`, 10, 60);
    pdf.text(`ID: ${alumno.id}`, 10, 70);
    pdf.text(`Factura: ${factura.numero}`, 10, 80);
    pdf.text(`Monto: $${alumno.monto}`, 10, 90);
    pdf.text(`Emisión: ${factura.emision}`, 10, 100);
    pdf.text(`Vencimiento: ${factura.vencimiento}`, 10, 110);

    // Generar QR como imagen
    const qr = new QRious({ value: factura.qr, size: 200 });
    pdf.addImage(qr.toDataURL(), "PNG", 10, 130, 80, 80);

    pdf.save(`Factura-${factura.numero}.pdf`);
}

// -------------------------------------------------------------
// ✔️ MARCAR COMO PAGADO
// -------------------------------------------------------------
function marcarPagado(id) {
    const alumno = alumnos.find(a => a.id === id);
    alumno.facturas[0].estado = "Pagada";
    alumno.facturas[0].fechaPago = new Date().toISOString().split("T")[0];
    guardar();
    mostrarAlumnos();
}
</script>

</body>
</html>
