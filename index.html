<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>CRM Instituto</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.sidebar{
width:220px;
height:100vh;
background:#1f2937;
color:white;
position:fixed;
padding:20px;
}

.sidebar button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
cursor:pointer;
}

.main{
margin-left:240px;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
max-width:600px;
}

.hidden{
display:none;
}

input,select{
padding:8px;
margin:5px;
width:220px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login" style="display:flex;justify-content:center;align-items:center;height:100vh;">

<div class="card">

<h3>Login CRM</h3>

<input id="user" placeholder="Usuario"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>

<button onclick="login()">Ingresar</button>

</div>

</div>

<!-- CRM -->

<div id="crm" class="hidden">

<div class="sidebar">

<h3>CRM</h3>

<button onclick="dashboard()">Dashboard</button>

<button onclick="nuevaVenta()">Nueva venta</button>

<button onclick="verAlumnos()">Buscar alumnos</button>

</div>

<div class="main">

<div id="panel" class="card">

<h3>Panel</h3>
<p>Bienvenido al CRM</p>

</div>

<div id="wizard" class="card hidden"></div>

<div id="alumnos" class="card hidden">

<h3>Alumnos</h3>

<input id="buscar" placeholder="Buscar..." onkeyup="buscar()">

<table width="100%">

<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Curso</th>
<th>Estado</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

</div>

<script>

const usuarios=[
{user:"admin",pass:"1234"},
{user:"ventas",pass:"1234"}
]

let alumnos=JSON.parse(localStorage.getItem("alumnos"))||[]

let paso=1
let venta={}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let ok=usuarios.find(x=>x.user===u && x.pass===p)

if(ok){

document.getElementById("login").style.display="none"
document.getElementById("crm").classList.remove("hidden")

}

}

function ocultar(){

document.querySelectorAll("#panel,#wizard,#alumnos").forEach(x=>x.classList.add("hidden"))

}

function dashboard(){

ocultar()
document.getElementById("panel").classList.remove("hidden")

}

function nuevaVenta(){

paso=1
venta={}

ocultar()

document.getElementById("wizard").classList.remove("hidden")

mostrarPaso()

}

function mostrarPaso(){

let w=document.getElementById("wizard")

if(paso===1){

w.innerHTML=`

<h3>Paso 1 — Datos personales</h3>

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="dni" placeholder="DNI">

<br><br>

<button onclick="guardarDatos()">Siguiente</button>

`

}

if(paso===2){

w.innerHTML=`

<h3>Paso 2 — Curso</h3>

<select id="curso" onchange="precio()">

<option value="">Curso</option>
<option value="idioma">Idioma</option>
<option value="office">Office</option>
<option value="tecnico">Reparación PC</option>

</select>

<div id="precio"></div>

<br>

<button onclick="siguiente()">Siguiente</button>

`

}

if(paso===3){

w.innerHTML=`

<h3>Paso 3 — Promoción</h3>

<select id="promo" onchange="promo()">

<option value="0">Sin promo</option>
<option value="25">25%</option>
<option value="30">30%</option>
<option value="50">50%</option>
<option value="10">Idioma 10%</option>

</select>

<div id="total"></div>

<br>

<button onclick="siguiente()">Siguiente</button>

`

}

if(paso===4){

w.innerHTML=`

<h3>Paso 4 — Pago</h3>

<select id="pago">

<option>No pagó</option>
<option>Pagó</option>

</select>

<br><br>

<button onclick="finalizar()">Finalizar</button>

`

}

}

function guardarDatos(){

venta.nombre=document.getElementById("nombre").value

siguiente()

}

function siguiente(){

paso++

mostrarPaso()

}

function precio(){

let curso=document.getElementById("curso").value

let ins=0
let men=0

if(curso==="idioma"){ins=20;men=20}
if(curso==="office"){ins=7;men=10}
if(curso==="tecnico"){ins=10;men=15}

venta.curso=curso
venta.mensual=men

document.getElementById("precio").innerHTML=

"Inscripción: USD "+ins+"<br>Cuota mensual: USD "+men

}

function promo(){

let p=parseInt(document.getElementById("promo").value)

let total=venta.mensual

if(venta.curso==="idioma" && p===10){

total=total*0.9

}else{

total=total*(1-p/100)

}

venta.total=total

document.getElementById("total").innerHTML=

"Cuota con promo: USD "+total.toFixed(2)

}

function generarID(){

return "ALU-"+Math.floor(Math.random()*100000)

}

function generarGestion(){

return "GEST-"+Date.now()

}

function finalizar(){

let alumno={

id:generarID(),
gestion:generarGestion(),
nombre:venta.nombre,
curso:venta.curso,
estado:document.getElementById("pago").value==="Pagó"?"Activo":"Inactivo"

}

alumnos.push(alumno)

localStorage.setItem("alumnos",JSON.stringify(alumnos))

alert("Alumno registrado")

dashboard()

}

function verAlumnos(){

ocultar()

document.getElementById("alumnos").classList.remove("hidden")

render()

}

function render(){

let tabla=document.getElementById("tabla")

tabla.innerHTML=""

alumnos.forEach(a=>{

tabla.innerHTML+=`

<tr>
<td>${a.id}</td>
<td>${a.nombre}</td>
<td>${a.curso}</td>
<td>${a.estado}</td>
</tr>

`

})

}

function buscar(){

let f=document.getElementById("buscar").value.toLowerCase()

document.querySelectorAll("#tabla tr").forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(f)?"":"none"

})

}

</script>

</body>
</html>
